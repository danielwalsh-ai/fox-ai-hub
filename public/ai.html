<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fox Group — AI Reports</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fox-navy:   #24214a;
      --fox-orange: #eb941f;
      --fox-green:  #94c21f;
      --fox-blue:   #00579e;
      --white:      #ffffff;
      --gray-50:    #f8f8fb;
      --gray-100:   #eeeeee;
      --gray-200:   #e0e0e8;
      --gray-400:   #9a9aaa;
      --gray-600:   #5a5a72;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-50);
      min-height: 100vh;
      color: var(--fox-navy);
      display: flex;
      flex-direction: column;
    }

    nav {
      background: var(--fox-navy);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      flex-shrink: 0;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-mark {
      width: 32px;
      height: 32px;
      background: var(--fox-orange);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo-mark i { font-size: 17px; color: var(--white); }
    .nav-logo-text { display: flex; flex-direction: column; line-height: 1; }
    .nav-logo-text .company { font-size: 14px; font-weight: 600; color: var(--white); }
    .nav-logo-text .product { font-size: 10px; color: var(--fox-orange); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

    .nav-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }

    .nav-btn:hover { background: rgba(255,255,255,0.08); color: var(--white); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1.5rem;
      min-height: 0;
    }

    .intro {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    .intro-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--fox-orange), #f5b04a);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .intro-icon i { font-size: 26px; color: var(--white); }

    .intro h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .intro p {
      font-size: 0.9rem;
      color: var(--gray-400);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .suggestion-chip {
      background: var(--white);
      border: 1.5px solid var(--gray-100);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.8rem;
      color: var(--gray-600);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }

    .suggestion-chip:hover {
      border-color: var(--fox-orange);
      color: var(--fox-navy);
    }

    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .msg {
      display: flex;
      gap: 0.75rem;
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }

    .msg.user .msg-avatar {
      background: var(--fox-navy);
      color: var(--white);
    }

    .msg.assistant .msg-avatar {
      background: var(--fox-orange);
      color: var(--white);
    }

    .msg-bubble {
      max-width: 75%;
      padding: 0.85rem 1.1rem;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .msg.user .msg-bubble {
      background: var(--fox-navy);
      color: var(--white);
      border-top-right-radius: 4px;
    }

    .msg.assistant .msg-bubble {
      background: var(--white);
      border: 1.5px solid var(--gray-100);
      border-top-left-radius: 4px;
      white-space: pre-wrap;
    }

    .msg-sources {
      margin-top: 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .source-tag {
      font-size: 0.7rem;
      background: var(--gray-50);
      color: var(--gray-400);
      padding: 3px 8px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .source-tag i { font-size: 11px; }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--gray-400);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    .input-area {
      flex-shrink: 0;
      padding: 1rem 0 1.5rem;
    }

    .input-wrap {
      display: flex;
      gap: 0.6rem;
      background: var(--white);
      border: 1.5px solid var(--gray-100);
      border-radius: 14px;
      padding: 0.6rem;
      align-items: flex-end;
    }

    .input-wrap textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem;
      max-height: 120px;
      color: var(--fox-navy);
      background: none;
    }

    .input-wrap textarea::placeholder { color: var(--gray-400); }

    .send-btn {
      background: var(--fox-navy);
      color: var(--white);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #1a1836; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn i { font-size: 18px; }

    .input-hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--gray-400);
      margin-top: 0.6rem;
    }

    @media (max-width: 600px) {
      main { padding: 0 1rem; }
      .msg-bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/hub">
      <div class="nav-logo-mark"><i class="ti ti-cpu"></i></div>
      <div class="nav-logo-text">
        <span class="company">Fox Group</span>
        <span class="product">AI Hub</span>
      </div>
    </a>
    <a href="/hub" class="nav-btn"><i class="ti ti-arrow-left"></i> Back to hub</a>
  </nav>

  <main>
    <div id="introSection">
      <div class="intro">
        <div class="intro-icon"><i class="ti ti-report-analytics"></i></div>
        <h1>Ask anything about your data</h1>
        <p>Get instant reports across the portals you have access to. Ask about tender pipelines, KPIs, plant utilisation, and more.</p>
        <div class="suggestions">
          <button class="suggestion-chip" onclick="askSuggestion(this)">How's the tender pipeline looking this month?</button>
          <button class="suggestion-chip" onclick="askSuggestion(this)">What's our plant utilisation trend?</button>
          <button class="suggestion-chip" onclick="askSuggestion(this)">Compare wagon ops revenue vs budget</button>
        </div>
      </div>
    </div>

    <div class="chat-log" id="chatLog"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="questionInput" placeholder="Ask about tenders, KPIs, plant hire..." rows="1" onkeydown="handleKeydown(event)" oninput="autoGrow(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendQuestion()">
          <i class="ti ti-send-2"></i>
        </button>
      </div>
      <div class="input-hint">Reports are generated from live data you have permission to access.</div>
    </div>
  </main>

  <script>
    const chatLog = document.getElementById('chatLog');
    const introSection = document.getElementById('introSection');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    let isLoading = false;

    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    }

    function askSuggestion(btn) {
      questionInput.value = btn.textContent;
      sendQuestion();
    }

    function addMessage(role, content, sources) {
      introSection.style.display = 'none';
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.innerHTML = role === 'user' ? '<i class="ti ti-user"></i>' : '<i class="ti ti-cpu"></i>';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = content;

      if (sources && sources.length > 0) {
        const sourcesEl = document.createElement('div');
        sourcesEl.className = 'msg-sources';
        sources.forEach(s => {
          const tag = document.createElement('span');
          tag.className = 'source-tag';
          tag.innerHTML = `<i class="ti ti-database"></i> ${s.portal} (${s.rowCount} rows)`;
          sourcesEl.appendChild(tag);
        });
        bubble.appendChild(sourcesEl);
      }

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatLog.appendChild(msg);
      chatLog.scrollTop = chatLog.scrollHeight;
      return bubble;
    }

    function addTypingIndicator() {
      introSection.style.display = 'none';
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.id = 'typingIndicator';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.innerHTML = '<i class="ti ti-cpu"></i>';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatLog.appendChild(msg);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function sendQuestion() {
      const question = questionInput.value.trim();
      if (!question || isLoading) return;

      addMessage('user', question);
      questionInput.value = '';
      questionInput.style.height = 'auto';
      isLoading = true;
      sendBtn.disabled = true;
      addTypingIndicator();

      try {
        const res = await fetch('/api/ai/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        removeTypingIndicator();

        if (!res.ok) {
          addMessage('assistant', data.error || 'Something went wrong. Try again.');
        } else {
          addMessage('assistant', data.report, data.sources);
        }
      } catch (err) {
        removeTypingIndicator();
        addMessage('assistant', 'Connection error. Please try again.');
      }

      isLoading = false;
      sendBtn.disabled = false;
    }

    async function checkAuth() {
      const res = await fetch('/api/me');
      if (!res.ok) window.location.href = '/login';
    }

    checkAuth();
  </script>
</body>
</html>
